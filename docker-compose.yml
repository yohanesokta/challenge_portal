version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - db
    
volumes:
  mariadb_data:
