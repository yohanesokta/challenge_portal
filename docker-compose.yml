services:
  db:
    image: mariadb:10.11
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://root:${MARIADB_ROOT_PASSWORD:-root}@db:3306/${MARIADB_DATABASE:-coding_platform}
    depends_on:
      - db
      - shortlink

  shortlink:
    build:
      context: ./shortlink-service
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://root:${MARIADB_ROOT_PASSWORD:-root}@db:3306/${MARIADB_DATABASE:-coding_platform}
    depends_on:
      - db
    
volumes:
  mariadb_data:
