services:
  db:
    image: mariadb:10.11
    restart: always
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - db
      - shortlink

  shortlink:
    build:
      context: ./shortlink-service
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - db
    
volumes:
  mariadb_data:
